name: anthropic
display_name: Anthropic
logo: "◆"
color: "#CC785C"
color_dim: "rgba(204,120,92,.12)"
homepage: https://anthropic.com
docs_url: https://docs.anthropic.com/en/api
api_key_env: ANTHROPIC_API_KEY
api_key_placeholder: "sk-ant-api03-…"
