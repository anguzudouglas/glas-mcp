services:
  - type: web
    name: glas-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon

    # Build triggers
    autoDeploy: true
    branch: main

    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0

      # Optional — set these in the Render dashboard to enable server-side keys
      # (playground always uses the user's browser-side key)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

    healthCheckPath: /health
